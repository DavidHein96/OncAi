name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Ruff
        run: uvx ruff@latest check .
      - name: Type check (ty)
        # Run inside the project env so ty can resolve dev deps (e.g. pytest).
        run: uv run --group dev ty check .

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run tests
        run: uv run --group dev pytest -q

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install JS dev deps
        run: npm ci
      - name: Lint (eslint)
        run: npx eslint .
      - name: Format check (prettier)
        run: npx prettier --check .
      - name: Run front-end tests
        run: node --test "web/*.test.js"
